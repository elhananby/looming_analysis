[analysis]
pre_ms = 100
post_ms = 500
max_gap_ms = 50
heading_ref_ms = 100
include_sham = false
cache_dir = ".braidz_cache"

[responsiveness]
method = "combined"
threshold_deg_s = 500
heading_threshold_deg = 45
baseline_window_ms = [-90, -10]
window_ms = 200

[plots]
col_by = "stimulus_offset_deg"
hue_by = "group"
